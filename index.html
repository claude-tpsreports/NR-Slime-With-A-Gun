<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <meta name="viewport" content="width=device-width, height=device-height, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>NR - Slime With A Gun</title>
    <link rel="shortcut icon" href="TemplateData/favicon.ico">
    <link rel="stylesheet" href="TemplateData/style.css">
    <style>
      html, body {
        margin: 0; padding: 0;
        width: 100%; height: 100%;
        overflow: hidden;
        background: #231F20;
        touch-action: none;
        -webkit-user-select: none; user-select: none;
        -webkit-touch-callout: none;
        overscroll-behavior: none;
        position: fixed;
      }
      #unity-container.mobile-fill {
        position: fixed; inset: 0;
        width: 100vw; height: 100vh; height: 100dvh;
      }
      #unity-container.mobile-fill #unity-canvas {
        width: 100%; height: 100%;
        touch-action: none;
      }
      /* --- Virtual joystick --- */
      #joystick-base {
        position: fixed;
        width: 120px; height: 120px;
        border-radius: 50%;
        background: rgba(255,255,255,0.10);
        border: 2px solid rgba(255,255,255,0.35);
        display: none;
        z-index: 20;
        pointer-events: none;
        transform: translate(-50%, -50%);
      }
      #joystick-knob {
        position: absolute;
        left: 50%; top: 50%;
        width: 52px; height: 52px;
        border-radius: 50%;
        background: rgba(255,255,255,0.45);
        transform: translate(-50%, -50%);
        pointer-events: none;
      }
      #joystick-zone {
        position: fixed;
        left: 0; bottom: 0;
        width: 42vw; height: 70vh;
        z-index: 15;
        touch-action: none;
        /* background: rgba(0,255,0,0.05);  uncomment to see the zone */
      }
      #joystick-hint {
        position: fixed;
        left: 16px; bottom: 18px;
        color: rgba(255,255,255,0.55);
        font-family: -apple-system, Helvetica, Arial, sans-serif;
        font-size: 13px;
        z-index: 14;
        pointer-events: none;
      }
      #fs-button {
        position: fixed;
        top: calc(10px + env(safe-area-inset-top, 0px));
        right: calc(10px + env(safe-area-inset-right, 0px));
        z-index: 25;
        width: 42px; height: 42px;
        border-radius: 10px;
        background: rgba(255,255,255,0.15);
        border: 1px solid rgba(255,255,255,0.3);
        color: #fff; font-size: 20px; line-height: 42px;
        text-align: center;
        touch-action: none;
      }
      .action-btn {
        position: fixed;
        right: calc(14px + env(safe-area-inset-right, 0px));
        width: 58px; height: 58px;
        border-radius: 50%;
        background: rgba(255,255,255,0.14);
        border: 2px solid rgba(255,255,255,0.35);
        color: #fff;
        z-index: 20;
        display: none;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        font-family: -apple-system, Helvetica, Arial, sans-serif;
        touch-action: none;
        -webkit-user-select: none; user-select: none;
      }
      .action-btn .k { font-size: 20px; font-weight: 700; line-height: 1; }
      .action-btn .l { font-size: 9px; opacity: 0.75; margin-top: 3px; text-transform: uppercase; letter-spacing: 0.5px; }
      .action-btn.pressed { background: rgba(255,255,255,0.45); }
      #btn-interact  { bottom: calc(20px + env(safe-area-inset-bottom, 0px)); }
      #btn-reload    { bottom: calc(94px + env(safe-area-inset-bottom, 0px)); }
      #btn-inventory { bottom: calc(168px + env(safe-area-inset-bottom, 0px)); }
      #btn-menu {
        right: auto;
        left: calc(14px + env(safe-area-inset-left, 0px));
        top: calc(14px + env(safe-area-inset-top, 0px));
        width: 48px; height: 48px;
      }
      #ver {
        position: fixed;
        left: 4px; bottom: 2px;
        color: rgba(255,255,255,0.35);
        font-family: monospace;
        font-size: 10px;
        z-index: 30;
        pointer-events: none;
      }
      #toast {
        position: fixed;
        left: 50%; bottom: 24px;
        transform: translateX(-50%);
        max-width: 82vw;
        background: rgba(0,0,0,0.8);
        color: #fff;
        font-family: -apple-system, Helvetica, Arial, sans-serif;
        font-size: 14px;
        padding: 10px 16px;
        border-radius: 10px;
        z-index: 90;
        display: none;
        text-align: center;
        pointer-events: none;
      }
      #rotate-overlay {
        position: fixed; inset: 0;
        background: rgba(20,18,18,0.92);
        color: #fff;
        z-index: 100;
        display: none;
        align-items: center; justify-content: center;
        text-align: center;
        font-family: -apple-system, Helvetica, Arial, sans-serif;
        font-size: 20px;
        padding: 24px;
      }
    </style>
  </head>
  <body>
    <div id="unity-container" class="unity-desktop">
      <canvas id="unity-canvas" width=1366 height=768 tabindex="-1"></canvas>
      <div id="unity-loading-bar">
        <div id="unity-logo"></div>
        <div id="unity-progress-bar-empty">
          <div id="unity-progress-bar-full"></div>
        </div>
      </div>
      <div id="unity-warning"> </div>
      <div id="unity-footer">
        <div id="unity-webgl-logo"></div>
        <div id="unity-fullscreen-button"></div>
        <div id="unity-build-title">NR - Slime With A Gun</div>
      </div>
    </div>

    <!-- Touch controls (shown only on touch devices) -->
    <div id="joystick-zone" style="display:none"></div>
    <div id="joystick-base"><div id="joystick-knob"></div></div>
    <div id="joystick-hint" style="display:none">move</div>
    <div id="fs-button" style="display:none">&#x26F6;</div>
    <div id="toast"></div>
    <div class="action-btn" id="btn-interact"><span class="k">E</span><span class="l">use</span></div>
    <div class="action-btn" id="btn-reload"><span class="k">R</span><span class="l">reload</span></div>
    <div class="action-btn" id="btn-inventory"><span class="k">&#x25A4;</span><span class="l">items</span></div>
    <div class="action-btn" id="btn-menu"><span class="k">P</span><span class="l">menu</span></div>
    <div id="ver"></div>
    <div id="rotate-overlay"><div>&#x1F4F1;&#x21BB;<br><br>Please rotate your phone sideways (landscape) to play</div></div>

    <script>
      var container = document.querySelector("#unity-container");
      var canvas = document.querySelector("#unity-canvas");
      var loadingBar = document.querySelector("#unity-loading-bar");
      var progressBarFull = document.querySelector("#unity-progress-bar-full");
      var fullscreenButton = document.querySelector("#unity-fullscreen-button");
      var warningBanner = document.querySelector("#unity-warning");

      function unityShowBanner(msg, type) {
        function updateBannerVisibility() {
          warningBanner.style.display = warningBanner.children.length ? 'block' : 'none';
        }
        var div = document.createElement('div');
        div.innerHTML = msg;
        warningBanner.appendChild(div);
        if (type == 'error') div.style = 'background: red; padding: 10px;';
        else {
          if (type == 'warning') div.style = 'background: yellow; padding: 10px;';
          setTimeout(function() {
            warningBanner.removeChild(div);
            updateBannerVisibility();
          }, 5000);
        }
        updateBannerVisibility();
      }

      var buildUrl = "Build";
      var loaderUrl = buildUrl + "/WebGL.loader.js";
      var config = {
        dataUrl: buildUrl + "/WebGL.data",
        frameworkUrl: buildUrl + "/WebGL.framework.js",
        codeUrl: buildUrl + "/WebGL.wasm",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "DefaultCompany",
        productName: "NR - BlackBelt",
        productVersion: "1.0",
        showBanner: unityShowBanner,
      };

      var isTouchDevice = ('ontouchstart' in window) || navigator.maxTouchPoints > 0;
      var isMobileUA = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
      var mobileMode = isTouchDevice && (isMobileUA || navigator.maxTouchPoints > 1);

      if (mobileMode) {
        container.className = "mobile-fill";
        canvas.className = "";
        // our mobile-fill class bypasses the template's .unity-mobile CSS,
        // so hide the desktop footer explicitly
        document.getElementById("unity-footer").style.display = "none";
        // Cap resolution for phone performance
        config.devicePixelRatio = Math.min(window.devicePixelRatio || 1, 2);
      } else {
        canvas.style.width = "1366px";
        canvas.style.height = "768px";
      }

      loadingBar.style.display = "block";

      var unityInstanceRef = null;
      var script = document.createElement("script");
      script.src = loaderUrl;
      script.onload = () => {
        createUnityInstance(canvas, config, (progress) => {
          progressBarFull.style.width = 100 * progress + "%";
        }).then((unityInstance) => {
          unityInstanceRef = unityInstance;
          loadingBar.style.display = "none";
          fullscreenButton.onclick = () => { unityInstance.SetFullscreen(1); };
        }).catch((message) => {
          alert(message);
        });
      };
      document.body.appendChild(script);

      /* ================= Fullscreen ================= */
      // Rules learned the hard way:
      // * Must be triggered from a user-activation event (touchend/click,
      //   NOT touchstart).
      // * Fullscreen the whole page, not the canvas, so overlays keep working.
      // * Detect support by the METHOD existing on the element — do not trust
      //   document.webkitFullscreenEnabled: iPhone WebKit reports true but
      //   only <video> elements can actually fullscreen there.
      // * iPhone (all browsers — they're all WebKit) can never element-
      //   fullscreen, so show a home-screen tip instead of a dead button.

      function showToast(html, ms) {
        var t = document.getElementById('toast');
        t.innerHTML = html;
        t.style.display = 'block';
        clearTimeout(showToast._t);
        showToast._t = setTimeout(function() { t.style.display = 'none'; }, ms || 4000);
      }

      function initFullscreenButton() {
        var fsBtn = document.getElementById('fs-button');
        var el = document.documentElement;
        var isIPhone = /iPhone|iPod/i.test(navigator.userAgent);
        var isStandalone = (navigator.standalone === true) ||
          (window.matchMedia && window.matchMedia('(display-mode: standalone)').matches);
        var rfs = el.requestFullscreen || el.webkitRequestFullscreen ||
                  el.webkitRequestFullScreen || el.mozRequestFullScreen || el.msRequestFullscreen;

        if (!rfs || isIPhone || isStandalone) {
          fsBtn.style.display = 'none';
          if (isIPhone && !isStandalone) {
            showToast('iPhone browsers can’t go fullscreen — for a fullscreen app, tap Share and “Add to Home Screen”', 7000);
          }
          return;
        }

        fsBtn.style.display = 'block';

        function isFs() {
          return !!(document.fullscreenElement || document.webkitFullscreenElement ||
                    document.mozFullScreenElement || document.msFullscreenElement);
        }
        function toggle() {
          if (isFs()) {
            var exit = document.exitFullscreen || document.webkitExitFullscreen ||
                       document.mozCancelFullScreen || document.msExitFullscreen;
            if (exit) exit.call(document);
            return;
          }
          var fail = function() { showToast('The browser blocked fullscreen', 4000); };
          try {
            var p = rfs.call(el, { navigationUI: 'hide' });
            if (p && p.catch) p.catch(function() {
              try {
                var q = rfs.call(el);
                if (q && q.catch) q.catch(fail);
              } catch (e) { fail(); }
            });
          } catch (e) {
            try { rfs.call(el); } catch (e2) { fail(); }
          }
        }
        fsBtn.addEventListener('touchend', function(ev) {
          ev.preventDefault();
          ev.stopPropagation();
          toggle();
        }, {passive: false});
        fsBtn.addEventListener('click', function(ev) {
          ev.preventDefault();
          toggle();
        });
      }

      /* ================= Touch controls ================= */

      function initTouchControls() {
        var zone = document.getElementById('joystick-zone');
        var base = document.getElementById('joystick-base');
        var knob = document.getElementById('joystick-knob');
        var hint = document.getElementById('joystick-hint');
        zone.style.display = 'block';
        hint.style.display = 'block';
        document.getElementById('unity-footer').style.display = 'none';

        // --- synthetic keyboard events (WASD) ---
        var KEYS = {
          W: {code:'KeyW', key:'w', keyCode:87},
          A: {code:'KeyA', key:'a', keyCode:65},
          S: {code:'KeyS', key:'s', keyCode:83},
          D: {code:'KeyD', key:'d', keyCode:68},
          E: {code:'KeyE', key:'e', keyCode:69},
          R: {code:'KeyR', key:'r', keyCode:82},
          P: {code:'KeyP', key:'p', keyCode:80},
          TAB: {code:'Tab', key:'Tab', keyCode:9}
        };
        var pressed = {W:false, A:false, S:false, D:false};

        function sendKey(type, k) {
          var info = KEYS[k];
          var e = new KeyboardEvent(type, {
            code: info.code, key: info.key,
            bubbles: true, cancelable: true, view: window
          });
          // KeyboardEvent constructor won't set keyCode/which — force them,
          // Unity's input reads these.
          Object.defineProperty(e, 'keyCode', { get: function(){ return info.keyCode; } });
          Object.defineProperty(e, 'which',   { get: function(){ return info.keyCode; } });
          // Dispatch on canvas; it bubbles up through document to window,
          // so it reaches Unity's listener wherever it was registered.
          canvas.dispatchEvent(e);
        }

        function setKeys(newState) {
          for (var k in pressed) {
            if (newState[k] && !pressed[k]) sendKey('keydown', k);
            if (!newState[k] && pressed[k]) sendKey('keyup', k);
            pressed[k] = newState[k];
          }
        }
        function releaseAll() { setKeys({W:false, A:false, S:false, D:false}); }

        // --- floating joystick ---
        var joyId = null, originX = 0, originY = 0;
        var RADIUS = 55, DEADZONE = 12, DIAG = 0.38;

        function updateJoystick(x, y) {
          var dx = x - originX, dy = y - originY;
          var mag = Math.sqrt(dx*dx + dy*dy);
          // knob visual (clamped to radius)
          var cl = mag > RADIUS ? RADIUS / mag : 1;
          knob.style.transform = 'translate(calc(-50% + ' + (dx*cl) + 'px), calc(-50% + ' + (dy*cl) + 'px))';
          if (mag < DEADZONE) { releaseAll(); return; }
          var nx = dx / mag, ny = dy / mag;
          setKeys({
            W: ny < -DIAG,
            S: ny >  DIAG,
            A: nx < -DIAG,
            D: nx >  DIAG
          });
        }

        zone.addEventListener('touchstart', function(ev) {
          ev.preventDefault();
          if (joyId !== null) return;
          var t = ev.changedTouches[0];
          joyId = t.identifier;
          originX = t.clientX; originY = t.clientY;
          base.style.left = originX + 'px';
          base.style.top = originY + 'px';
          base.style.display = 'block';
          hint.style.display = 'none';
        }, {passive: false});

        zone.addEventListener('touchmove', function(ev) {
          ev.preventDefault();
          for (var i = 0; i < ev.changedTouches.length; i++) {
            var t = ev.changedTouches[i];
            if (t.identifier === joyId) updateJoystick(t.clientX, t.clientY);
          }
        }, {passive: false});

        function endJoy(ev) {
          ev.preventDefault();
          for (var i = 0; i < ev.changedTouches.length; i++) {
            if (ev.changedTouches[i].identifier === joyId) {
              joyId = null;
              base.style.display = 'none';
              knob.style.transform = 'translate(-50%, -50%)';
              releaseAll();
            }
          }
        }
        zone.addEventListener('touchend', endJoy, {passive: false});
        zone.addEventListener('touchcancel', endJoy, {passive: false});

        // --- action buttons (E / R / Tab as touch buttons) ---
        // keydown on press, keyup on release, so holding E works like
        // holding the key on a keyboard.
        function bindActionButton(id, keyName) {
          var b = document.getElementById(id);
          b.style.display = 'flex';
          function down(ev) {
            ev.preventDefault(); ev.stopPropagation();
            b.classList.add('pressed');
            sendKey('keydown', keyName);
          }
          function up(ev) {
            ev.preventDefault(); ev.stopPropagation();
            b.classList.remove('pressed');
            sendKey('keyup', keyName);
          }
          b.addEventListener('touchstart', down, {passive: false});
          b.addEventListener('touchend', up, {passive: false});
          b.addEventListener('touchcancel', up, {passive: false});
          // mouse fallback for hybrid/touchscreen-laptop devices
          b.addEventListener('mousedown', down);
          b.addEventListener('mouseup', up);
        }
        bindActionButton('btn-interact', 'E');
        bindActionButton('btn-reload', 'R');
        bindActionButton('btn-inventory', 'TAB');
        bindActionButton('btn-menu', 'P');

        // One-time hint: firing is built into aiming
        setTimeout(function() {
          showToast('Aim &amp; fire: touch or drag the right side of the screen. Hold to keep firing.', 6000);
        }, /iPhone|iPod/i.test(navigator.userAgent) ? 7500 : 1500);

        // Safety: if the page loses focus mid-game, release keys
        window.addEventListener('blur', releaseAll);
        document.addEventListener('visibilitychange', function() {
          if (document.hidden) releaseAll();
        });

        // --- rotate-to-landscape hint ---
        var rotate = document.getElementById('rotate-overlay');
        function checkOrientation() {
          var portrait = window.innerHeight > window.innerWidth;
          rotate.style.display = portrait ? 'flex' : 'none';
          if (portrait) releaseAll();
        }
        checkOrientation();
        window.addEventListener('resize', checkOrientation);
        window.addEventListener('orientationchange', function(){ setTimeout(checkOrientation, 250); });

        // Block iOS double-tap zoom & context menu
        document.addEventListener('contextmenu', function(e){ e.preventDefault(); });
        var lastTap = 0;
        document.addEventListener('touchend', function(e) {
          var now = Date.now();
          if (now - lastTap < 350) e.preventDefault();
          lastTap = now;
        }, {passive: false, capture: false});
      }

      /* ================= Startup ================= */
      // Controls initialize immediately — NOT gated on the game finishing
      // loading — so buttons are usable/visible even while Unity boots
      // (and even if the load promise never resolves).
      var VERSION = 'v4';
      document.getElementById('ver').textContent = VERSION;
      initFullscreenButton();
      if (mobileMode) initTouchControls();

      // Home-screen (standalone) apps cache hard; check for a newer
      // deployed version and tell the player how to get it.
      setTimeout(function() {
        fetch(window.location.pathname + '?verchk=' + Date.now(), {cache: 'no-store'})
          .then(function(r) { return r.text(); })
          .then(function(t) {
            var m = t.match(/var VERSION = '(v\d+)'/);
            if (m && m[1] !== VERSION) {
              showToast('Game update available — fully close this app (swipe it away) and reopen it', 8000);
            }
          })
          .catch(function() {});
      }, 5000);
    </script>
  </body>
</html>
